<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEIMIA UGC Brand Collaboration Hub</title>
  <link rel="stylesheet" href="/css/campaign.css">
</head>
<body>
  <div class="campaign-page">
    <!-- Hero Section -->
    <section id="campaign-hero" class="campaign-hero" aria-label="캠페인 히어로 이미지">
      <img id="hero-image" class="campaign-hero__image" src="" alt="캠페인 이미지">
    </section>

    <!-- Introduction Section -->
    <section id="campaign-introduction" class="campaign-introduction" aria-label="캠페인 소개">
      <div class="campaign-introduction__content">
        <p id="introduction-text"></p>
      </div>
    </section>

    <!-- Product Section -->
    <section id="product-section" class="product-section" aria-label="상품 섹션">
      <div id="product-container" class="product-section__container">
        <!-- Populated by campaign.js based on product_mode -->
      </div>
    </section>

    <!-- Registration Form Section -->
    <section id="form-section" class="form-section" aria-label="신청 폼">
      <div id="form-container" class="form-section__container">
        <!-- Populated by task 6.6 -->
      </div>
    </section>

    <!-- UGC Gallery Section -->
    <section id="ugc-gallery-section" class="ugc-gallery-section" aria-label="UGC 갤러리">
      <div id="ugc-gallery-container" class="ugc-gallery-section__container">
        <!-- Populated by task 6.7 -->
      </div>
    </section>
  </div>

  <!-- Scripts -->
  <script src="/js/i18n.js"></script>
  <script src="/js/campaign.js"></script>
</body>
</html>
